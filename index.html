<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  html,body{margin:0;height:100%;background:#000;}
  .wrap{position:fixed;inset:0;width:100%;height:100%;}
  #ctVideo{width:100%;height:100%;object-fit:contain;background:#000;}
  #unmute{position:absolute;bottom:16px;right:16px;display:none;
          padding:10px 14px;border:0;border-radius:24px;cursor:pointer;
          background:rgba(0,0,0,.65);color:#fff;font:600 14px/1 sans-serif;}
  #close{position:absolute;top:14px;right:14px;z-index:5;width:36px;height:36px;
         border:0;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;
         font:700 20px/36px sans-serif;cursor:pointer;}
</style>
</head>
<body>
  <div class="wrap">
    <button id="close" aria-label="Close" onclick="ctClose()">&times;</button>

    <video id="ctVideo"
           src="https://cdn.jsdelivr.net/gh/Vikaswiom/wiom-inapp-video@main/seva_stithi_full_v19.mp4?playsinline=1"
           autoplay
           playsinline
           webkit-playsinline></video>

    <button id="unmute">&#128266; Tap for sound</button>

    <script>
      (function () {
        var v = document.getElementById('ctVideo');
        var btn = document.getElementById('unmute');
        v.muted = false; v.volume = 1;                 // sound ON by default
        var p = v.play();
        if (p && p.catch) {
          p.catch(function () {                          // platform blocked sound-on autoplay
            v.muted = true; v.play();
            btn.style.display = 'block';
          });
        }
        btn.addEventListener('click', function () {
          v.muted = false; v.volume = 1; v.play();
          btn.style.display = 'none';
        });
      })();

      function ctClose(){
        try{
          if(window.CleverTap && window.CleverTap.dismissInAppNotification){
            window.CleverTap.dismissInAppNotification();              // Android
          } else if(window.webkit && window.webkit.messageHandlers
                    && window.webkit.messageHandlers.clevertap){      // iOS
            window.webkit.messageHandlers.clevertap.postMessage({action:'dismissInAppNotification'});
          }
        }catch(e){}
      }
    </script>
  </div>
</body>
</html>
