<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  html,body{margin:0;height:100%;background:#000;}
  .wrap{position:fixed;inset:0;width:100%;height:100%;}
  #ctVideo{width:100%;height:100%;object-fit:contain;background:#000;}
  #close{position:absolute;top:14px;right:14px;z-index:5;width:38px;height:38px;
         border:0;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;
         font:700 22px/38px sans-serif;cursor:pointer;}
</style>
</head>
<body>
  <div class="wrap">
    <button id="close" aria-label="Close" onclick="ctClose()">&times;</button>
    <video id="ctVideo"
           src="https://cdn.jsdelivr.net/gh/Vikaswiom/wiom-inapp-video@main/seva_stithi_full_v19.mp4?playsinline=1"
           autoplay playsinline webkit-playsinline controls
           controlsList="nodownload"></video>
    <script>
      (function () {
        var v = document.getElementById('ctVideo');
        function soundOn(){ v.muted = false; v.volume = 1; }   // unmuted by default
        soundOn();
        v.addEventListener('loadedmetadata', soundOn);
        var p = v.play();
        if (p && p.catch) { p.catch(function(){ soundOn(); v.play(); }); }
      })();
      function ctClose(){
        try{
          if(window.CleverTap && window.CleverTap.dismissInAppNotification){
            window.CleverTap.dismissInAppNotification();              // Android
          } else if(window.webkit && window.webkit.messageHandlers
                    && window.webkit.messageHandlers.clevertap){      // iOS
            window.webkit.messageHandlers.clevertap.postMessage({action:'dismissInAppNotification'});
          }
        }catch(e){}
      }
    </script>
  </div>
</body>
</html>
